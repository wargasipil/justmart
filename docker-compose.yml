services:
  postgres:
    image: postgres:latest
    container_name: justmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: justmart
      POSTGRES_USER: justmart
      POSTGRES_PASSWORD: justmart
    ports:
      - "5432:5432"
    # Named volume (was a bind-mount to ./data/postgres). Named volume so
    # `docker compose down -v` cleanly wipes it from any shell, enabling the
    # cross-platform `make reset-devel-data` target.
    volumes:
      - justmart_devel_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justmart -d justmart"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  justmart_devel_data:



