server:
  # host: interface to bind.
  #   0.0.0.0   = all interfaces — reachable from the LAN / inside Docker (default)
  #   127.0.0.1 = this machine only — single-PC install
  host: 0.0.0.0
  port: 8080

database:
  # driver: database engine. "postgres" (default) or "sqlite".
  #   postgres = multi-user / server deploy (host/port/user/... below).
  #   sqlite   = turnkey, zero-dependency single-binary deploy (no Postgres or
  #              Docker). Stock correctness is preserved via a single-writer
  #              connection; backups use VACUUM INTO instead of pg_dump.
  driver: postgres
  # path: SQLite database file (only used when driver: sqlite). Empty => ./justmart.db.
  # path: ./justmart.db
  host: localhost
  port: 5432
  user: justmart
  password: justmart
  name: justmart
  sslmode: disable
  # auto_migrate: run goose migrations on server boot. Default OFF — migrations
  # are applied explicitly via `cmd/server migrate up` (or `make migrate-up`).
  # Set true for a turnkey deploy that should self-migrate on start.
  auto_migrate: false

auth:
  jwt_secret: change-me-to-a-long-random-string
  access_token_ttl: 1h
  refresh_token_ttl: 720h   # 30 days

bootstrap:
  owner_email: owner@justmart.local
  owner_password: change-me-on-first-login

# Optional: offline license token (a JWT minted by `cmd/license`) that selects
# the business mode — retail or pharmacy/apotek. A token set here (or via the
# JUSTMART_LICENSE env var) takes precedence and is re-applied every boot;
# otherwise the server falls back to a license applied in-app under
# Settings > License. Empty = unlicensed (mode UNSPECIFIED, behaves as retail).
# license: ""

# Optional: ESC/POS thermal printer. Leave `enabled: false` to disable Print
# in the POS receipt dialog. Backend opens a raw TCP connection to `address`
# and writes ESC/POS bytes; most network thermal printers listen on port 9100.
printer:
  enabled: false
  address: 192.168.1.100:9100
  width: 32                # 32 for 58mm paper, 48 for 80mm paper
  timeout: 5s
  open_drawer: false       # send cash-drawer kick command after print
  header:
    - "JUSTMART"
    - "Jl. Example No. 123"
    - "Bandung"
  footer:
    - "Thank you!"

# How PrintReceipt dispatches the rendered receipt. The receipt is rendered the
# same way (using the `printer.*` header/footer/width above) in both modes.
#   mode: tcp        -> raw TCP to printer.address (the default; network printers)
#   mode: connector  -> push to a Justmart print connector running next to the
#                       printer (USB/any Windows printer via the print spooler).
# Connectors connect freely (no auth) - trusted single-shop LAN. Pick the default
# connector/printer in Settings > Printing (or per-sale in the POS receipt dialog).
connector:
  mode: tcp
# (backup_YYYY-mm-dd_HHMMSS/{database.sql.gz,manifest.txt}).
# Empty => "./backups" (CWD-relative). Override with JUSTMART_BACKUP_DIR.
backup:
  directory: ./backups
  # Cache for the auto-downloaded pg_dump binary when none is on PATH or
  # bundled next to the justmart executable (used on bare-metal Windows dev).
  # Empty => <UserCacheDir>/justmart/pgtools. Override with JUSTMART_PG_TOOLS_DIR.
  # pg_tools_dir: ""
