syntax = "proto3";

package purchasing_iface.v1;

import "auth_iface/v1/policy.proto";

option go_package = "github.com/justmart/backend/gen/purchasing_iface/v1;purchasingifacev1";

message PurchaseReceipt {
  string id = 1;
  string receipt_no = 2;
  string purchase_order_id = 3;
  string received_at = 4;          // YYYY-MM-DD
  string received_by = 5;
  string note = 6;
  int64 created_at = 7;
  repeated PurchaseReceiptItem items = 8;
  string invoice_no = 9;           // supplier invoice / nomor faktur
}

message PurchaseReceiptItem {
  string id = 1;
  string purchase_receipt_id = 2;
  string purchase_order_item_id = 3;
  string product_id = 4;
  int32 qty = 5;
  int64 unit_cost_price = 6;
  string batch_number = 7;
  string expiry_date = 8;          // YYYY-MM-DD
  string batch_id = 9;             // populated after batch row is created
  // qty is in BASE units; these describe the purchasable unit received in.
  string product_unit_id = 10;
  string unit_name = 11;
  int64 unit_factor = 12;
}

message ReceiveLineInput {
  string purchase_order_item_id = 1;
  int32 qty = 2;                   // qty in the chosen purchasable unit
  int64 unit_cost_price = 3;       // per BASE unit; overrideable
  string batch_number = 4;
  string expiry_date = 5;          // YYYY-MM-DD (required)
  string product_unit_id = 6;     // purchasable unit; empty => PO line's unit
}

service PurchaseReceiptService {
  rpc CreateReceipt(CreateReceiptRequest) returns (CreateReceiptResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
  rpc ListReceipts(ListReceiptsRequest) returns (ListReceiptsResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
  rpc GetReceipt(GetReceiptRequest) returns (GetReceiptResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
}

message CreateReceiptRequest {
  string purchase_order_id = 1;
  string received_at = 2;          // YYYY-MM-DD (defaults to today if empty)
  string note = 3;
  repeated ReceiveLineInput lines = 4;
  string invoice_no = 5;           // supplier invoice / nomor faktur
}
message CreateReceiptResponse {
  PurchaseReceipt receipt = 1;
}

message ListReceiptsRequest {
  string purchase_order_id = 1;
}
message ListReceiptsResponse {
  repeated PurchaseReceipt receipts = 1;
}

message GetReceiptRequest { string id = 1; }
message GetReceiptResponse { PurchaseReceipt receipt = 1; }
