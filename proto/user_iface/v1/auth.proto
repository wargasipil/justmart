syntax = "proto3";

package user_iface.v1;

import "auth_iface/v1/policy.proto";
import "user_iface/v1/users.proto";

option go_package = "github.com/justmart/backend/gen/user_iface/v1;userifacev1";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (auth_iface.v1.public) = true;
  }
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (auth_iface.v1.public) = true;
  }
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Me(MeRequest) returns (MeResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  int64 access_expires_at = 4;
  int64 refresh_expires_at = 5;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_expires_at = 3;
  int64 refresh_expires_at = 4;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message MeRequest {}
message MeResponse {
  User user = 1;
}
