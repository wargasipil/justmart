syntax = "proto3";

package inventory_iface.v1;

import "auth_iface/v1/policy.proto";
import "inventory_iface/v1/product.proto";

option go_package = "github.com/justmart/backend/gen/inventory_iface/v1;inventoryifacev1";

message Batch {
  string id = 1;
  string product_id = 2;
  string supplier_id = 3;
  string batch_number = 4;
  string expiry_date = 5;
  int64 cost_price = 6;
  string received_at = 7;
  int64 current_quantity = 8;
  int64 created_at = 9;
  // PO that originated this batch via its receipt (empty for legacy / manual
  // CreateBatch path). Populated as display-only enrichment in ListBatches.
  string purchase_order_id = 10;
  string po_no = 11;
  // Owning product's name. Populated as display-only enrichment in
  // SearchBatches so pickers can show a human-readable medicine label.
  string product_name = 12;
  // Owning product's active units of measure (base first). Populated as
  // enrichment in SearchBatches so a picker can offer per-line unit entry
  // (e.g. transfer "2 box"). Stock/qty stay in base units.
  repeated ProductUnit units = 13;
}

service BatchService {
  rpc ListBatches(ListBatchesRequest) returns (ListBatchesResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc GetBatch(GetBatchRequest) returns (GetBatchResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc CreateBatch(CreateBatchRequest) returns (CreateBatchResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
  rpc UpdateBatch(UpdateBatchRequest) returns (UpdateBatchResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
  rpc SearchBatches(SearchBatchesRequest) returns (SearchBatchesResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  // ResolveBatches returns minimal display refs for a set of ids (batch
  // lookup-by-IDs for name resolution; never a full-list preload).
  rpc ResolveBatches(ResolveBatchesRequest) returns (ResolveBatchesResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
}

message ListBatchesRequest {
  string product_id = 1;
  bool only_in_stock = 2;
  int32 limit = 3;
  int32 offset = 4;
  string query = 5;        // ILIKE batch_number / product name / sku
  int64 from_unix = 6;     // date-range lower bound (0 = unbounded)
  int64 to_unix = 7;       // date-range upper bound (exclusive; 0 = unbounded)
  string date_field = 8;   // which date the range filters: "received" | "expiry"
  string supplier_id = 9;  // optional supplier ID filter
}
message ListBatchesResponse {
  repeated Batch batches = 1;
  int32 total = 2;
}

message GetBatchRequest { string id = 1; }
message GetBatchResponse { Batch batch = 1; }

message CreateBatchRequest {
  string product_id = 1;
  string supplier_id = 2;
  string batch_number = 3;
  string expiry_date = 4;
  int64 cost_price = 5;
  string received_at = 6;
  int64 initial_quantity = 7;
}
message CreateBatchResponse { Batch batch = 1; }

message UpdateBatchRequest {
  string id = 1;
  string supplier_id = 2;
  string batch_number = 3;
  string expiry_date = 4;
  int64 cost_price = 5;
  string received_at = 6;
}
message UpdateBatchResponse { Batch batch = 1; }

message SearchBatchesRequest {
  string query = 1;
  int32 limit = 2;
  string product_id = 3;     // optional scope: search within a single product's batches
  string warehouse_id = 4;   // optional: scope current_quantity to this warehouse (empty = active warehouse)
  bool only_in_stock = 5;    // when true, only return batches with stock in the scoped warehouse
}
message SearchBatchesResponse {
  repeated Batch batches = 1;
}

// Minimal display ref for resolve-by-IDs name lookups (joins products for the name).
message BatchRef {
  string id = 1;
  string batch_number = 2;
  string product_id = 3;
  string product_name = 4;
}
message ResolveBatchesRequest { repeated string ids = 1; }
message ResolveBatchesResponse { repeated BatchRef batches = 1; }
