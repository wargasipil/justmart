syntax = "proto3";

package pos_iface.v1;

import "auth_iface/v1/policy.proto";

option go_package = "github.com/justmart/backend/gen/pos_iface/v1;posifacev1";

enum PaymentSource {
  PAYMENT_SOURCE_UNSPECIFIED = 0;
  PAYMENT_SOURCE_CASH = 1;
  PAYMENT_SOURCE_NON_CASH = 2;  // card / QRIS / transfer
}

enum SaleStatus {
  SALE_STATUS_UNSPECIFIED = 0;
  SALE_STATUS_DRAFT = 1;
  SALE_STATUS_COMPLETED = 2;
  SALE_STATUS_VOIDED = 3;
}

message Sale {
  reserved 6, 16;  // removed: tax_invoice_no, prescription_id

  string id = 1;
  string sale_no = 2;
  string customer_id = 3;
  string cashier_user_id = 4;
  PaymentSource payment_source = 5;
  int64 subtotal = 7;
  int64 cart_discount = 8;
  int64 total = 9;
  int64 paid_amount = 10;
  SaleStatus status = 11;
  string branch_id = 12;
  int64 created_at = 13;
  int64 completed_at = 14;
  repeated SaleItem items = 15;
  string warehouse_id = 17;
  string customer_name = 18;   // denormalized for the order-history list
}

message SaleItem {
  string id = 1;
  string sale_id = 2;
  string product_id = 3;
  string batch_id = 4;         // unused under multi-unit (per-batch breakdown is on stock_movements)
  int32 qty = 5;               // qty in the selling unit
  int64 unit_price_snapshot = 6;
  int64 line_discount = 7;
  int64 line_total = 8;
  string product_name = 9;    // denormalized for the order-history list
  string product_unit_id = 10;
  string unit_name = 11;       // selling unit name (e.g. "box")
  int64 unit_factor = 12;      // base units per selling unit
  int32 base_qty = 13;         // qty × factor (base units consumed)
}

service SaleService {
  rpc StartSale(StartSaleRequest) returns (StartSaleResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc GetSale(GetSaleRequest) returns (GetSaleResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc ListSales(ListSalesRequest) returns (ListSalesResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc AddItem(AddItemRequest) returns (AddItemResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc SetItemQuantity(SetItemQuantityRequest) returns (SetItemQuantityResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc RemoveItem(RemoveItemRequest) returns (RemoveItemResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc SetSaleCustomer(SetSaleCustomerRequest) returns (SetSaleCustomerResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc CompleteSale(CompleteSaleRequest) returns (CompleteSaleResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc VoidSale(VoidSaleRequest) returns (VoidSaleResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  // DiscardSale hard-deletes a DRAFT sale (and its items). Used for abandoned
  // POS carts so they leave no VOIDED trace. Only DRAFT sales are discardable.
  rpc DiscardSale(DiscardSaleRequest) returns (DiscardSaleResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc GetTodaySnapshot(GetTodaySnapshotRequest) returns (GetTodaySnapshotResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc GetSalesSummary(GetSalesSummaryRequest) returns (GetSalesSummaryResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
  rpc PrintReceipt(PrintReceiptRequest) returns (PrintReceiptResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
  }
}

message StartSaleRequest {}
message StartSaleResponse { Sale sale = 1; }

message GetSaleRequest { string id = 1; }
message GetSaleResponse { Sale sale = 1; }

message ListSalesRequest {
  int64 from_unix = 1;
  int64 to_unix = 2;
  SaleStatus status = 3;
  int32 limit = 4;
  int32 offset = 5;
  string query = 6;          // ILIKE sale_no / customer name / product name
}
message ListSalesResponse {
  repeated Sale sales = 1;
  int32 total = 2;
}

message AddItemRequest {
  string sale_id = 1;
  string product_id = 2;
  int32 qty = 3;                // qty in the chosen unit
  string product_unit_id = 4; // selling unit; empty = the product's base unit
}
message AddItemResponse { Sale sale = 1; }

message SetItemQuantityRequest {
  string sale_id = 1;
  string item_id = 2;
  int32 qty = 3;
}
message SetItemQuantityResponse { Sale sale = 1; }

message RemoveItemRequest {
  string sale_id = 1;
  string item_id = 2;
}
message RemoveItemResponse { Sale sale = 1; }

message SetSaleCustomerRequest {
  string sale_id = 1;
  string customer_id = 2;
}
message SetSaleCustomerResponse { Sale sale = 1; }

message CompleteSaleRequest {
  string sale_id = 1;
  PaymentSource payment_source = 2;
  int64 paid_amount = 3;
}
message CompleteSaleResponse { Sale sale = 1; }

message VoidSaleRequest {
  string sale_id = 1;
}
message VoidSaleResponse { Sale sale = 1; }

message DiscardSaleRequest {
  string sale_id = 1;
}
message DiscardSaleResponse {}

message GetTodaySnapshotRequest {
  // Optional cashier-scope filter. Empty = include every cashier (OWNER /
  // PHARMACIST view). Set = only sales by that cashier (CASHIER view passes
  // their own user id). Non-OWNER callers may only pass their own id.
  string cashier_user_id = 1;
}
message GetTodaySnapshotResponse {
  int64  revenue          = 1;
  int64  sale_count       = 2;
  int64  items_sold       = 3;
  string top_product_id  = 4;
  int64  top_product_qty = 5;
  // Unix seconds of the latest completed_at matching the filters, or 0 if
  // no qualifying sale today.
  int64  last_sale_unix   = 6;
}

// Aggregate over the SAME filters as ListSales (status + date range + search),
// across ALL matching rows — not just one page. Backs the order-history
// summary bar; the list itself stays server-paginated via ListSales.
message GetSalesSummaryRequest {
  int64 from_unix = 1;
  int64 to_unix = 2;
  SaleStatus status = 3;
  string query = 4;          // ILIKE sale_no / customer name / product name
}
message GetSalesSummaryResponse {
  int64 sale_count = 1;
  int64 items_sold = 2;      // SUM(sale_items.qty)
  int64 revenue = 3;         // SUM(sales.total)
}

message PrintReceiptRequest {
  string sale_id = 1;
}
message PrintReceiptResponse {
  // Echoes the rendered byte length so the client can confirm something
  // actually went out the wire (mostly for debugging).
  int32 bytes_sent = 1;
}
