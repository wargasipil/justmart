syntax = "proto3";

package settings_iface.v1;

import "auth_iface/v1/policy.proto";

option go_package = "github.com/justmart/backend/gen/settings_iface/v1;settingsifacev1";

// App-wide settings (one row in app_settings per key). Today only the
// low-stock threshold is wired; the table + proto are open for future keys.
message Settings {
  // Warn when a product's ready_stock in the active warehouse is <= this
  // number. Default 10 when no row exists yet.
  int32 low_stock_threshold = 1;
}

service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
  }

  // Readable by every authenticated role — the business mode drives branding,
  // navigation and POS behavior for all users (cashier + apoteker included).
  rpc GetBussinessSettings(GetBussinessSettingsRequest) returns (GetBussinessSettingsResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
    option (auth_iface.v1.allowed_roles) = ROLE_APOTEKER;
  }
  // Setting the shop's business type is an owner-level config change.
  rpc SetBussinessSettings(SetBussinessSettingsRequest) returns (SetBussinessSettingsResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
  }

  // ApplyLicense verifies a license token (entered in Settings), persists it,
  // and applies its business type. Owner-only.
  rpc ApplyLicense(ApplyLicenseRequest) returns (ApplyLicenseResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
  }
  // GetLicenseInfo reports the currently-applied license (holder name + mode).
  // Readable by every role (the holder name brands the app for all users); only
  // applying a license (ApplyLicense) is owner-gated.
  rpc GetLicenseInfo(GetLicenseInfoRequest) returns (GetLicenseInfoResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
    option (auth_iface.v1.allowed_roles) = ROLE_CASHIER;
    option (auth_iface.v1.allowed_roles) = ROLE_APOTEKER;
  }

  // GetPrintTarget / SetPrintTarget store the DEFAULT print connector + printer
  // (app_settings) used by SaleService.PrintReceipt when the request carries no
  // explicit target. Get is manager-tier (drives the Settings ▸ Printing panel);
  // Set is owner-only.
  rpc GetPrintTarget(GetPrintTargetRequest) returns (GetPrintTargetResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
    option (auth_iface.v1.allowed_roles) = ROLE_PHARMACIST;
  }
  rpc SetPrintTarget(SetPrintTargetRequest) returns (SetPrintTargetResponse) {
    option (auth_iface.v1.allowed_roles) = ROLE_OWNER;
  }
}

enum BussinessType {
  BUSSINESS_TYPE_UNSPECIFIED = 0;
  BUSSINESS_TYPE_PHARMACY_SHOP = 1;
  BUSSINESS_TYPE_RETAIL = 2;
}

message GetBussinessSettingsRequest {}

message GetBussinessSettingsResponse {
  BussinessType type = 1;   // the shop's configured business type (UNSPECIFIED when unset)
  string name = 2;          // licensed shop/holder name (empty when unlicensed) — readable by all roles for branding
}

message SetBussinessSettingsRequest {
  BussinessType type = 1;   // must be a concrete type (not UNSPECIFIED)
}
message SetBussinessSettingsResponse {
  BussinessType type = 1;   // the persisted type, echoed back
}

message ApplyLicenseRequest {
  string token = 1;         // the license token (JWT) pasted by the owner
}
message ApplyLicenseResponse {
  string name = 1;          // verified license holder / business name
  BussinessType type = 2;   // the business type the license applied
}

message GetLicenseInfoRequest {}
message GetLicenseInfoResponse {
  bool has_license = 1;     // true when a license has been applied
  string name = 2;          // licensed holder / business name (empty when none)
  BussinessType type = 3;   // the active business type
}

message GetSettingsRequest {}
message GetSettingsResponse {
  Settings settings = 1;
}

message UpdateSettingsRequest {
  int32 low_stock_threshold = 1;
}
message UpdateSettingsResponse {
  Settings settings = 1;
}

message GetPrintTargetRequest {}
message GetPrintTargetResponse {
  string connector_device_id = 1; // saved default connector ("" = none)
  string printer_name = 2;        // saved default printer ("" = connector default)
}
message SetPrintTargetRequest {
  string connector_device_id = 1;
  string printer_name = 2;
}
message SetPrintTargetResponse {
  string connector_device_id = 1;
  string printer_name = 2;
}
