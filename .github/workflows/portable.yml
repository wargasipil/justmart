# Builds the portable Windows distribution (SQLite, no installer) via
# packaging/windows/build-portable.ps1 — a self-contained justmart.exe + SQLite
# config + launcher, zipped. Runs on a Windows runner (the script is PowerShell
# and emits a win64 .exe). Uploads the zip as an artifact on every run, and
# publishes a GitHub Release with the zip on `v*` tags.
#
# Trigger a release:  git tag v1.2.0 && git push origin v1.2.0
# Build on demand:    Actions tab -> "Portable (Windows)" -> Run workflow (set version)
name: Portable (Windows)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the portable bundle (e.g. 1.2.0). Blank => dev label."
        required: false
        default: ""

# Cancel superseded runs on the same ref (branch/PR); tags don't collide.
concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # required to create a Release on tag push

jobs:
  portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Gate the build on the unit suite (SQLite, no external DB — servicetest
      # uses throwaway sqlite files). Keeps a broken commit from being packaged.
      - name: Unit tests
        shell: pwsh
        run: go -C backend test ./internal/... -count=1

      - name: Resolve version
        id: ver
        shell: pwsh
        env:
          REF: ${{ github.ref }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if ($env:REF -like 'refs/tags/v*') {
            $v = $env:REF.Substring('refs/tags/v'.Length)   # v1.2.0 -> 1.2.0
          } elseif ($env:INPUT_VERSION) {
            $v = $env:INPUT_VERSION
          } else {
            $v = "0.0.0-$($env:GITHUB_SHA.Substring(0,7))"   # dev build label
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Portable version: $v"

      # build-portable.ps1 runs `npm ci` + `npm run build`, embeds the SPA, then
      # cross-builds the win64 exe (CGO_ENABLED=0, pure-Go SQLite), assembles the
      # folder from packaging/windows/portable-template, and zips it.
      - name: Build portable bundle
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: ./packaging/windows/build-portable.ps1 -AppVersion $env:APP_VERSION -Port 8080

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: justmart-portable-${{ steps.ver.outputs.version }}
          path: dist/justmart-portable-*.zip
          if-no-files-found: error

      # Tag pushes (v*) publish a Release with the zip attached. Uses the
      # first-party gh CLI (preinstalled on the runner) — no third-party action.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = (Get-ChildItem dist/justmart-portable-*.zip | Select-Object -First 1).FullName
          # Idempotent: create the release if it's new, else attach/overwrite the
          # asset (so a re-run or re-pushed tag doesn't fail on "already exists").
          gh release view "$env:GITHUB_REF_NAME" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" "$zip" --title "Justmart $env:GITHUB_REF_NAME" --generate-notes
          } else {
            gh release upload "$env:GITHUB_REF_NAME" "$zip" --clobber
          }
